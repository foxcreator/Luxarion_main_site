<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investors - Luxarion</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050507;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 2rem;
        }

        p {
            opacity: 0.6;
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        a.btn {
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            border-radius: 4px;
            transition: background 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        a.btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <div>
        <h1>Investors</h1>
        <p>We are currently gathering strategic partners for our next funding round. Reach out via <a
                href="mailto:invest@luxarion.com" style="color:#fff; text-decoration:underline;">invest@luxarion.com</a>
            to request our pitch deck.</p>
        <a href="/" class="btn">Return to Home</a>
    </div>
</body>

</html>
